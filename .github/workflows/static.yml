<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profi GitHub Portfólió</title>
    <!-- Google betűtípus a profi megjelenésért -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --accent: #238636; /* GitHub zöld */
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: var(--card);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 400px;
            text-align: center;
        }
        h1 { color: white; margin-bottom: 0.5rem; }
        p { line-height: 1.6; opacity: 0.8; }
        .status {
            display: inline-block;
            background: rgba(35, 134, 54, 0.2);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        .btn {
            display: block;
            margin-top: 1.5rem;
            background-color: var(--accent);
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background-color: #2ea043; }
    </style>
</head>
<body>

    <div class="container">
        <div class="status">● Online - GitHub Ready</div>
        <h1>Üdv a Profilomon!</h1>
        <p>Ez az oldal sikeresen hosztolva van a GitHub szerverein. Tiszta kód, gyors betöltés, semmi sallang.</p>
        
        <a href="https://github.com" class="btn">Vissza a GitHubra</a>
    </div>

</body>
</html>

